version: '3.8'

services:
  db:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_DATABASE: afridata
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    volumes:
      - .:/app
      # Persistent named volumes for user uploads so they survive container rebuilds
      - afridata_media:/app/media
      - afridata_datasets:/app/datasets
      - afridata_profile_pics:/app/profile_pics
      - afridata_exports:/app/exports
      - afridata_processed:/app/processed
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      # Use DATABASE_URL for dj-database-url parsing in settings.py
      - DATABASE_URL=mysql://user:password@db:3306/afridata
      - DB_HOST=db
      - DB_PORT=3306

volumes:
  mysql_data:
  afridata_media:
  afridata_datasets:
  afridata_profile_pics:
  afridata_exports:
  afridata_processed:
