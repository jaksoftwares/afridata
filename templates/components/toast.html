{% if messages %}
<div id="global-messages-container" class="fixed top-4 right-4 z-[9999] flex flex-col space-y-2 pointer-events-none">
    {% for message in messages %}
    <div class="toast-message pointer-events-auto flex items-center p-4 mb-2 rounded-lg shadow-lg text-sm text-white transition-all duration-500 transform translate-x-0
        {% if message.tags == 'success' %}bg-brand-green
        {% elif message.tags == 'error' %}bg-red-500
        {% elif message.tags == 'warning' %}bg-brand-amber
        {% else %}bg-brand-blue{% endif %}" role="alert" aria-live="polite">
        
        <div class="mr-3">
            {% if message.tags == 'success' %}
                <i class="fas fa-check-circle text-xl"></i>
            {% elif message.tags == 'error' %}
                <i class="fas fa-exclamation-circle text-xl"></i>
            {% elif message.tags == 'warning' %}
                <i class="fas fa-exclamation-triangle text-xl"></i>
            {% else %}
                <i class="fas fa-info-circle text-xl"></i>
            {% endif %}
        </div>
        <div class="font-medium mr-4">{{ message }}</div>
        <button type="button" class="ml-auto -mx-1.5 -my-1.5 p-1.5 text-white/80 hover:text-white rounded-lg focus:ring-2 focus:ring-white" onclick="this.parentElement.remove()" aria-label="Close message">
            <i class="fas fa-times"></i>
        </button>
    </div>
    {% endfor %}
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toasts = document.querySelectorAll('.toast-message');
        toasts.forEach(toast => {
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-full');
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        });
    });
</script>
{% endif %}
