{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AfriData - Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0B4F6C',
                            teal: '#1B998B',
                            green: '#7BC67B',
                            offwhite: '#F7FAFC',
                            grey: '#4A5568',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        title: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="shortcut icon" type="image/svg+xml" href="{% static 'images/afridata-icon.svg' %}">
    <style type="text/tailwindcss">
        @layer base {
            body { @apply font-sans bg-brand-offwhite text-brand-grey antialiased; position: relative; }
        }
        .glass-card { @apply bg-white border border-gray-100 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.05)] rounded-2xl; }
        .input-focus-effect { transition: all 0.2s ease; }
        .input-focus-effect:focus-within { @apply border-brand-teal; box-shadow: 0 0 0 3px rgba(27, 153, 139, 0.1); }
        .btn-primary { @apply bg-brand-blue hover:bg-brand-blue/95 transition-all duration-200; }
        .btn-primary:hover { transform: translateY(-1px); }
        .floating-label-group { position: relative; }
        .floating-label-group input { padding: 1.25rem 0.875rem 0.375rem 0.875rem; outline: none; height: 46px; }
        .floating-label-group label {
            position: absolute; top: 0.35rem; left: 0.875rem; font-size: 0.7rem;
            font-weight: 600; color: #9ca3af; text-transform: uppercase;
            letter-spacing: 0.05em; pointer-events: none; transition: all 0.2s ease;
        }
        .brand-title { @apply font-title font-bold tracking-tight text-brand-blue; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Back to Home -->
    <div class="absolute top-6 left-6 md:top-8 md:left-10 z-50">
        <a href="/" class="group flex items-center space-x-2 text-[13px] font-semibold text-brand-grey hover:text-brand-blue transition-colors bg-white/50 hover:bg-white backdrop-blur-md px-4 py-2 rounded-full border border-gray-200/50 shadow-sm">
            <i class="fas fa-arrow-left text-[11px] group-hover:-translate-x-1 transition-transform"></i>
            <span>Back to Home</span>
        </a>
    </div>

    <!-- Container -->
    <div class="glass-card w-full max-w-[420px] overflow-hidden relative z-10">
        <!-- Header -->
        <div class="px-6 sm:px-8 pt-8 sm:pt-10 pb-6 sm:pb-8 text-center border-b border-gray-50">
            <div class="mx-auto bg-brand-teal/10 w-14 h-14 rounded-full flex items-center justify-center mb-4 text-brand-teal">
                <i class="fas fa-unlock-alt text-xl"></i>
            </div>
            <h2 class="text-2xl sm:text-3xl brand-title mb-1.5">Forgot Password?</h2>
            <p class="text-gray-400 font-medium text-[13px] px-2">Enter your email address and we'll send you a link to reset your password.</p>
        </div>

        <div class="p-6 sm:p-8">
            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <div class="floating-label-group input-focus-effect rounded-lg border border-gray-200 bg-gray-50/30">
                        <input type="email" name="email" id="id_email" class="w-full bg-transparent text-[15px] text-gray-900 rounded-lg font-medium" placeholder=" " required />
                        <label for="id_email">Email Address</label>
                    </div>
                    {% if form.email.errors %}
                    <p class="text-red-500 text-[13px] font-semibold mt-1 ml-1 flex items-center"><i class="fas fa-exclamation-circle mr-1"></i>{{ form.email.errors.0 }}</p>
                    {% endif %}
                </div>

                <button type="submit" class="w-full btn-primary text-white py-3 rounded-lg text-[15px] font-bold shadow-md shadow-brand-blue/10 mt-4 flex justify-center items-center">
                    Send Reset Link
                </button>
            </form>
            
            <div class="mt-6 text-center text-[13px] text-gray-500 font-medium">
                Remember your password? <a href="/accounts/?mode=login" class="font-bold text-brand-teal hover:text-brand-blue transition-colors">Sign in here</a>
            </div>
        </div>
    </div>
</body>
</html>
