{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AfriData - Password Reset Complete</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0B4F6C',
                            teal: '#1B998B',
                            green: '#7BC67B',
                            offwhite: '#F7FAFC',
                            grey: '#4A5568',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        title: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="shortcut icon" type="image/svg+xml" href="{% static 'images/afridata-icon.svg' %}">
    <style type="text/tailwindcss">
        @layer base {
            body { @apply font-sans bg-brand-offwhite text-brand-grey antialiased; position: relative; }
        }
        .glass-card { @apply bg-white border border-gray-100 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.05)] rounded-2xl; }
        .btn-primary { @apply bg-brand-blue hover:bg-brand-blue/95 transition-all duration-200; }
        .btn-primary:hover { transform: translateY(-1px); }
        .brand-title { @apply font-title font-bold tracking-tight text-brand-blue; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Back to Home -->
    <div class="absolute top-6 left-6 md:top-8 md:left-10 z-50">
        <a href="/" class="group flex items-center space-x-2 text-[13px] font-semibold text-brand-grey hover:text-brand-blue transition-colors bg-white/50 hover:bg-white backdrop-blur-md px-4 py-2 rounded-full border border-gray-200/50 shadow-sm">
            <i class="fas fa-arrow-left text-[11px] group-hover:-translate-x-1 transition-transform"></i>
            <span>Back to Home</span>
        </a>
    </div>

    <!-- Container -->
    <div class="glass-card w-full max-w-[420px] overflow-hidden relative z-10">
        <div class="px-6 sm:px-8 pt-8 sm:pt-10 pb-6 sm:pb-8 text-center border-b border-gray-50">
            <div class="mx-auto bg-brand-green/10 w-14 h-14 rounded-full flex items-center justify-center mb-4 text-brand-green">
                <i class="fas fa-check-circle text-xl"></i>
            </div>
            <h2 class="text-2xl sm:text-3xl brand-title mb-1.5">Password Reset Complete</h2>
            <p class="text-gray-400 font-medium text-[13px] px-2">Your password has been successfully reset. You may log in now with your new password.</p>
        </div>
        <div class="p-6 sm:p-8 text-center">
             <a href="/accounts/?mode=login" class="w-full inline-block btn-primary text-white py-3 rounded-lg text-[15px] font-bold shadow-md shadow-brand-blue/10">Log in</a>
        </div>
    </div>
</body>
</html>
