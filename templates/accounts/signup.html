{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AfriData - Create Account</title>
    <!-- Brand Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0B4F6C',
                            teal: '#1B998B',
                            green: '#7BC67B',
                            offwhite: '#F7FAFC',
                            grey: '#4A5568',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        title: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="shortcut icon" type="image/svg+xml" href="{% static 'images/afridata-icon.svg' %}">
    <style type="text/tailwindcss">
        @layer base {
            body { 
                @apply font-sans bg-brand-offwhite text-brand-grey antialiased; 
                position: relative;
            }
        }
        
        .glass-card {
            @apply bg-white border border-gray-100 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.05)] rounded-2xl;
        }
        
        .input-focus-effect {
            transition: all 0.2s ease;
        }
        
        .input-focus-effect:focus-within {
            @apply border-brand-teal;
            box-shadow: 0 0 0 3px rgba(27, 153, 139, 0.1);
        }
        
        .btn-primary {
            @apply bg-brand-blue hover:bg-brand-blue/95 transition-all duration-200;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
        }
        
        .floating-label-group {
            position: relative;
        }
        
        .floating-label-group input, .floating-label-group textarea {
            padding: 1.5rem 1rem 0.5rem 1rem;
            outline: none;
        }
        
        .floating-label-group label {
            position: absolute;
            top: 0.45rem;
            left: 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .brand-title {
            @apply font-title font-bold tracking-tight text-brand-blue;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">

    <!-- Top Left Logo -->
    <div class="absolute top-6 left-6 md:top-8 md:left-10 z-50">
        <a href="/" class="hover:-translate-y-0.5 transition-all block bg-white/95 backdrop-blur-sm rounded-full px-5 py-2 shadow-xl border border-white/50">
            <img src="/static/images/afridata-logo.svg" alt="AfriData Logo" class="h-8 md:h-10 w-auto object-contain" style="transform: scale(1.15); transform-origin: center;">
        </a>
    </div>

    <!-- Messages Container -->
    <div id="messages-container" class="fixed top-4 right-4 z-50 space-y-2">
        {% if messages %}
            {% for message in messages %}
            <div class="p-4 rounded-lg shadow-lg max-w-sm mb-2 {% if message.tags == 'error' %}bg-red-50 text-red-700 border-l-4 border-red-500{% else %}bg-green-50 text-green-700 border-l-4 border-green-500{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}
    </div>

    <!-- Signup Container -->
    <div class="glass-card w-full max-w-3xl overflow-hidden relative z-10 my-8">
        
        <!-- Header -->
        <div class="px-8 pt-12 pb-8 text-center border-b border-gray-50">
            <img src="/static/images/afridata-logo.svg" alt="AfriData Logo" class="h-16 w-auto mx-auto mb-6 object-contain" style="transform: scale(1.1);">
            <h2 class="text-3xl brand-title mb-2">Create Account</h2>
            <p class="text-gray-400 font-medium text-sm">Join the research community.</p>
        </div>

        <div class="p-8 sm:p-10">
            <form id="signupForm" method="POST" action="/accounts/signup/" class="space-y-6">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.GET.next|default:'/' }}">

                <!-- Row 1 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="floating-label-group input-focus-effect rounded-xl border border-gray-200 bg-gray-50/30">
                        <input type="text" name="full_name" id="signupName" class="w-full bg-transparent text-gray-900 rounded-xl font-medium" placeholder=" " required />
                        <label for="signupName">Full Name *</label>
                    </div>

                    <div class="floating-label-group input-focus-effect rounded-xl border border-gray-200 bg-gray-50/30">
                        <input type="text" name="username" id="signupUsername" class="w-full bg-transparent text-gray-900 rounded-xl font-medium" placeholder=" " />
                        <label for="signupUsername">Username</label>
                    </div>
                </div>

                <!-- Row 2 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="floating-label-group input-focus-effect rounded-xl border border-gray-200 bg-gray-50/30">
                        <input type="email" name="email" id="signupEmail" class="w-full bg-transparent text-gray-900 rounded-xl font-medium" placeholder=" " required />
                        <label for="signupEmail">Email Address *</label>
                    </div>

                    <div class="floating-label-group input-focus-effect rounded-xl border border-gray-200 bg-gray-50/30">
                        <input type="tel" name="phone_number" id="signupPhone" class="w-full bg-transparent text-gray-900 rounded-xl font-medium" placeholder=" " />
                        <label for="signupPhone">Phone Number</label>
                    </div>
                </div>

                <!-- Row 3 (Passwords) -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="floating-label-group input-focus-effect rounded-xl border border-gray-200 bg-gray-50/30 relative">
                        <input type="password" name="password" id="signupPassword" class="w-full bg-transparent text-gray-900 rounded-xl pr-10 font-medium" placeholder=" " required />
                        <label for="signupPassword">Password *</label>
                        <button type="button" class="absolute right-3 top-4.5 text-gray-300 hover:text-gray-600 focus:outline-none" onclick="togglePassword('signupPassword', 'signupPwdEye')">
                            <i class="fas fa-eye" id="signupPwdEye"></i>
                        </button>
                    </div>

                    <div class="floating-label-group input-focus-effect rounded-xl border border-gray-200 bg-gray-50/30 relative">
                        <input type="password" name="confirm_password" id="signupConfirm" class="w-full bg-transparent text-gray-900 rounded-xl pr-10 font-medium" placeholder=" " required />
                        <label for="signupConfirm">Confirm Password *</label>
                    </div>
                </div>

                <!-- Row 4 -->
                <div class="floating-label-group input-focus-effect rounded-xl border border-gray-200 bg-gray-50/30">
                    <textarea name="bio" id="signupBio" rows="2" class="w-full bg-transparent text-gray-900 rounded-xl font-medium resize-none" placeholder=" "></textarea>
                    <label for="signupBio">Brief Bio</label>
                </div>

                <!-- Row 5 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="floating-label-group input-focus-effect rounded-xl border border-gray-200 bg-gray-50/30">
                        <input type="date" name="date_of_birth" id="signupDOB" class="w-full bg-transparent text-gray-900 rounded-xl text-sm font-medium" placeholder=" " />
                        <label for="signupDOB">Date of Birth</label>
                    </div>

                    <div class="floating-label-group input-focus-effect rounded-xl border border-gray-200 bg-gray-50/30">
                        <input type="text" name="referral_code" id="signupReferral" class="w-full bg-transparent text-gray-900 rounded-xl font-medium" placeholder=" " />
                        <label for="signupReferral">Referral Code</label>
                    </div>
                </div>

                <!-- Terms -->
                <div class="flex items-start space-x-3 mt-6">
                    <input type="checkbox" name="terms" id="terms" class="w-5 h-5 rounded border-gray-300 text-brand-teal focus:ring-brand-teal mt-0.5" required>
                    <label for="terms" class="text-sm text-gray-500 font-medium leading-relaxed">
                        I agree to the <a href="/terms/" class="text-brand-blue font-bold hover:underline">Terms of Service</a> and <a href="/privacy/" class="text-brand-blue font-bold hover:underline">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" id="signupSubmitBtn" class="w-full btn-primary text-white py-4 rounded-xl font-bold shadow-xl shadow-brand-blue/10 mt-8 flex justify-center items-center">
                    Create Account
                </button>
            </form>
            
            <div class="mt-8 text-center text-sm text-gray-500 font-medium border-t border-gray-50 pt-8">
                Already have an account? <a href="?mode=login" class="font-bold text-brand-teal hover:text-brand-blue transition-colors">Sign in here</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, eyeId) {
            const input = document.getElementById(inputId);
            const eye = document.getElementById(eyeId);
            if (input.type === 'password') {
                input.type = 'text';
                eye.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                eye.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
        
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('signupSubmitBtn');
            const pass = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;
            
            if (pass !== confirm) {
                e.preventDefault();
                alert('Passwords do not match.');
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Opening Account...';
            btn.style.opacity = '0.8';
            btn.style.pointerEvents = 'none';
        });

        setTimeout(() => {
            const container = document.getElementById('messages-container');
            if(container) {
                container.style.opacity = '0';
                container.style.transition = 'opacity 0.5s ease';
                setTimeout(() => container.remove(), 500);
            }
        }, 5000);
    </script>
</body>
</html>
