{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AfriData - Sign In</title>
    <!-- Brand Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0B4F6C',
                            teal: '#1B998B',
                            green: '#7BC67B',
                            offwhite: '#F7FAFC',
                            grey: '#4A5568',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        title: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="shortcut icon" type="image/svg+xml" href="{% static 'images/afridata-icon.svg' %}">
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-sans bg-brand-offwhite text-brand-grey antialiased;
                position: relative;
            }
        }
        
        .glass-card {
            @apply bg-white border border-gray-100 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.05)] rounded-2xl;
        }
        
        .input-focus-effect {
            transition: all 0.2s ease;
        }
        
        .input-focus-effect:focus-within {
            @apply border-brand-teal;
            box-shadow: 0 0 0 3px rgba(27, 153, 139, 0.1);
        }
        
        .btn-primary {
            @apply bg-brand-blue hover:bg-brand-blue/95 transition-all duration-200;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
        }
        
        .floating-label-group {
            position: relative;
        }
        
        .floating-label-group input {
            padding: 1.5rem 1rem 0.5rem 1rem;
            outline: none;
        }
        
        .floating-label-group label {
            position: absolute;
            top: 0.45rem;
            left: 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .brand-title {
            @apply font-title font-bold tracking-tight text-brand-blue;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Top Left Logo -->
    <div class="absolute top-6 left-6 md:top-8 md:left-10 z-50">
        <a href="/" class="hover:-translate-y-0.5 transition-all block bg-white/95 backdrop-blur-sm rounded-full px-5 py-2 shadow-xl border border-white/50">
            <img src="/static/images/afridata-logo.svg" alt="AfriData Logo" class="h-8 md:h-10 w-auto object-contain" style="transform: scale(1.15); transform-origin: center;">
        </a>
    </div>

    <!-- Messages Container -->
    <div id="messages-container" class="fixed top-4 right-4 z-50 space-y-2">
        {% if messages %}
            {% for message in messages %}
            <div class="p-4 rounded-lg shadow-lg max-w-sm mb-2 {% if message.tags == 'error' %}bg-red-50 text-red-700 border-l-4 border-red-500{% else %}bg-green-50 text-green-700 border-l-4 border-green-500{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}
    </div>

    <!-- Login Container -->
    <div class="glass-card w-full max-w-md overflow-hidden relative z-10">
        
        <!-- Header -->
        <div class="px-8 pt-12 pb-8 text-center border-b border-gray-50">
            <img src="/static/images/afridata-logo.svg" alt="AfriData Logo" class="h-16 w-auto mx-auto mb-6 object-contain" style="transform: scale(1.1);">
            <h2 class="text-3xl brand-title mb-2">Welcome Back</h2>
            <p class="text-gray-400 font-medium text-sm">Sign in to your account.</p>
        </div>

        <div class="p-8">
            <!-- Login Form -->
            <form id="loginForm" method="POST" action="/accounts/login/" class="space-y-5">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.GET.next|default:'/' }}">

                <div class="floating-label-group input-focus-effect rounded-xl border border-gray-200 bg-gray-50/30">
                    <input type="email" name="email" id="loginEmail" class="w-full bg-transparent text-gray-900 rounded-xl font-medium" placeholder=" " required />
                    <label for="loginEmail">Email Address</label>
                </div>

                <div class="floating-label-group input-focus-effect rounded-xl border border-gray-200 bg-gray-50/30 relative">
                    <input type="password" name="password" id="loginPassword" class="w-full bg-transparent text-gray-900 rounded-xl pr-10 font-medium" placeholder=" " required />
                    <label for="loginPassword">Password</label>
                    <button type="button" class="absolute right-3 top-4.5 text-gray-300 hover:text-gray-600 focus:outline-none" onclick="togglePassword('loginPassword', 'loginPasswordEye')">
                        <i class="fas fa-eye" id="loginPasswordEye"></i>
                    </button>
                </div>

                <div class="flex items-center justify-between pt-2">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" name="remember_me" class="w-4 h-4 rounded border-gray-300 text-brand-teal focus:ring-brand-teal">
                        <span class="text-sm text-gray-500 font-medium">Remember me</span>
                    </label>
                    <a href="/accounts/password-reset/" class="text-xs font-bold text-brand-teal hover:text-brand-blue uppercase tracking-widest transition-colors">Forgot?</a>
                </div>

                <button type="submit" class="w-full btn-primary text-white py-4 rounded-xl font-bold shadow-xl shadow-brand-blue/10 mt-6 flex justify-center items-center">
                    Sign In
                </button>
            </form>
            
            <div class="mt-8 text-center text-sm text-gray-500 font-medium">
                Don't have an account? <a href="?mode=signup" class="font-bold text-brand-teal hover:text-brand-blue transition-colors">Create an account</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, eyeId) {
            const input = document.getElementById(inputId);
            const eye = document.getElementById(eyeId);
            if (input.type === 'password') {
                input.type = 'text';
                eye.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                eye.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Connecting...';
            btn.style.opacity = '0.8';
            btn.style.pointerEvents = 'none';
        });

        setTimeout(() => {
            const container = document.getElementById('messages-container');
            if(container) {
                container.style.opacity = '0';
                container.style.transition = 'opacity 0.5s ease';
                setTimeout(() => container.remove(), 500);
            }
        }, 5000);
    </script>
</body>
</html>
