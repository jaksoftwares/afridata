{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AfriData - Verify Email</title>
    <!-- Brand Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#0B4F6C',
                            teal: '#1B998B',
                            green: '#7BC67B',
                            offwhite: '#F7FAFC',
                            grey: '#4A5568',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        title: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="shortcut icon" type="image/svg+xml" href="{% static 'images/afridata-icon.svg' %}">
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-sans bg-brand-offwhite text-brand-grey antialiased;
                position: relative;
            }
        }
        
        .glass-card {
            @apply bg-white border border-gray-100 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.05)] rounded-2xl;
        }
        
        .input-focus-effect {
            transition: all 0.2s ease;
        }
        
        .input-focus-effect:focus-within {
            @apply border-brand-teal;
            box-shadow: 0 0 0 3px rgba(27, 153, 139, 0.1);
        }
        
        .btn-primary {
            @apply bg-brand-blue hover:bg-brand-blue/95 transition-all duration-200;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
        }
        
        .floating-label-group {
            position: relative;
        }
        
        .floating-label-group input {
            padding: 1.5rem 1rem 0.5rem 1rem;
            outline: none;
            letter-spacing: 0.2em;
        }
        
        .floating-label-group label {
            position: absolute;
            top: 0.45rem;
            left: 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .brand-title {
            @apply font-title font-bold tracking-tight text-brand-blue;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Top Left Logo -->
    <div class="absolute top-6 left-6 md:top-8 md:left-10 z-50">
        <a href="/" class="hover:-translate-y-0.5 transition-all block bg-white/95 backdrop-blur-sm rounded-full px-5 py-2 shadow-xl border border-white/50">
            <img src="{% static 'images/afridata-logo.svg' %}" alt="AfriData Logo" class="h-8 md:h-10 w-auto object-contain" style="transform: scale(1.15); transform-origin: center;">
        </a>
    </div>



    <!-- Verify Container -->
    <div class="glass-card w-full max-w-md overflow-hidden relative z-10">
        
        <!-- Header -->
        <div class="px-8 pt-12 pb-8 text-center border-b border-gray-50">
            <div class="mx-auto bg-brand-blue/10 w-16 h-16 rounded-full flex items-center justify-center mb-6">
                <i class="fas fa-envelope-open-text text-2xl text-brand-blue"></i>
            </div>
            <h2 class="text-3xl brand-title mb-2">Check Your Email</h2>
            <p class="text-gray-500 font-medium text-sm leading-relaxed">
                We sent a verification code to <br/>
                <span class="font-bold text-gray-800">{{ email }}</span><br/>
                <span class="text-xs text-gray-400 mt-2 inline-block">Please check your email inbox or spam folder.</span>
            </p>
        </div>

        <div class="p-8">
            <!-- Verify Form -->
            <form id="verifyForm" method="POST" action="{% url 'verify_email' %}" class="space-y-5">
                {% csrf_token %}

                <div class="floating-label-group input-focus-effect rounded-xl border border-gray-200 bg-gray-50/30">
                    <input type="text" name="code" id="verificationCode" class="w-full bg-transparent text-gray-900 rounded-xl font-bold text-center text-xl" placeholder=" " required maxlength="6" pattern="\d{6}" autocomplete="one-time-code" />
                    <label for="verificationCode" style="text-align: center; width: calc(100% - 2rem);">6-Digit Code</label>
                </div>

                <button type="submit" class="w-full btn-primary text-white py-4 rounded-xl font-bold shadow-xl shadow-brand-blue/10 mt-6 flex justify-center items-center">
                    Verify Account
                </button>
            </form>
            
            <div class="mt-8 text-center text-sm font-medium">
                <form method="POST" action="{% url 'resend_verification' %}" class="inline">
                    {% csrf_token %}
                    <span class="text-gray-500">Didn't receive the code?</span> 
                    <button type="submit" class="font-bold text-brand-teal hover:text-brand-blue transition-colors bg-transparent border-none cursor-pointer inline">
                        Resend Code
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('verifyForm').addEventListener('submit', function() {
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Verifying...';
            btn.style.opacity = '0.8';
            btn.style.pointerEvents = 'none';
        });
    </script>
</body>
</html>
